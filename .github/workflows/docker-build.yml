name: Docker Build and Push

on:
    push:
        branches:
            - master
        paths-ignore:
            - "**.md"
            - "docs/**"
    workflow_dispatch:

env:
    REGISTRY: ghcr.io

jobs:
    build-and-push:
        name: Build and Push (${{ matrix.type }})
        runs-on: ubuntu-latest
        timeout-minutes: 60
        permissions:
            contents: read
            packages: write

        strategy:
            fail-fast: false
            matrix:
                include:
                    # 1. 既存のオールインワン版（変更なし）
                    - type: all-in-one
                      dockerfile: ./Dockerfile
                      image_name: vemiorg/mirelplatform
                      description: "Full stack (Backend + Frontend + Nginx)"

                    # 2. 新規のSaaS用バックエンド版
                    - type: backend-only
                      dockerfile: ./Dockerfile.backend
                      image_name: vemiorg/mirelplatform-backend
                      description: "Backend only (Spring Boot optimized for Cloud Run)"

        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Read VERSION file
              id: version
              run: |
                  VERSION=$(cat VERSION)
                  echo "version=${VERSION}" >> $GITHUB_OUTPUT
                  echo "📦 Building version: ${VERSION}"

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            # docker/login-action の代わりにシェルでログインしてリトライ。
            # 2026-05-11 に ghcr.io への login で Client.Timeout が複数回発生
            # （プラットフォーム既知問題: github/community/discussions/182234 /
            # githubstatus.com/incidents/vkr22005hg0x）。
            # username は github.actor ではなく repository_owner にして
            # 移管後も新 org が一貫して使われるようにする。
            - name: Log in to GitHub Container Registry
              shell: bash
              env:
                  GHCR_REGISTRY: ${{ env.REGISTRY }}
                  GHCR_USER: ${{ github.repository_owner }}
                  GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  MAX_ATTEMPTS=3
                  for attempt in $(seq 1 $MAX_ATTEMPTS); do
                      echo "[attempt $attempt/$MAX_ATTEMPTS] Logging into $GHCR_REGISTRY as $GHCR_USER..."
                      if echo "$GHCR_TOKEN" | docker login "$GHCR_REGISTRY" -u "$GHCR_USER" --password-stdin; then
                          echo "Login succeeded on attempt $attempt"
                          exit 0
                      fi
                      if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
                          BACKOFF=$((attempt * 10))
                          echo "Login failed, waiting ${BACKOFF}s before retry..."
                          sleep "$BACKOFF"
                      fi
                  done
                  echo "All $MAX_ATTEMPTS login attempts failed" >&2
                  exit 1

            - name: Extract metadata (tags, labels)
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: ${{ env.REGISTRY }}/${{ matrix.image_name }}
                  tags: |
                      type=ref,event=branch
                      type=sha,prefix={{branch}}-
                      type=raw,value=latest,enable={{is_default_branch}}
                  labels: |
                      org.opencontainers.image.description=${{ matrix.description }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ${{ matrix.dockerfile }}
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha,scope=${{ matrix.type }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.type }}
                  platforms: linux/amd64
                  build-args: |
                      NODE_VERSION=22
                      NVM_VERSION=0.39.7
                      APP_VERSION=${{ steps.version.outputs.version }}

            - name: Image digest
              run: echo "Image [${{ matrix.type }}] pushed with digest ${{ steps.meta.outputs.digest }}"

            - name: Create summary
              run: |
                  echo "## Docker Build Summary 🐳 (${{ matrix.type }})" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "**Registry:** \`${{ env.REGISTRY }}\`" >> $GITHUB_STEP_SUMMARY
                  echo "**Image:** \`${{ matrix.image_name }}\`" >> $GITHUB_STEP_SUMMARY
                  echo "**Description:** ${{ matrix.description }}" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "### Tags" >> $GITHUB_STEP_SUMMARY
                  echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
                  echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
                  echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "### Pull Command" >> $GITHUB_STEP_SUMMARY
                  echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
                  echo "docker pull ${{ env.REGISTRY }}/${{ matrix.image_name }}:latest" >> $GITHUB_STEP_SUMMARY
                  echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

    verify-all-in-one:
        name: Verify All-in-One Image
        runs-on: ubuntu-latest
        needs: build-and-push
        timeout-minutes: 15
        permissions:
            contents: read
            packages: read

        steps:
            # docker/login-action の代わりにシェルでログインしてリトライ。
            # 2026-05-11 に ghcr.io への login で Client.Timeout が複数回発生
            # （プラットフォーム既知問題: github/community/discussions/182234 /
            # githubstatus.com/incidents/vkr22005hg0x）。
            # username は github.actor ではなく repository_owner にして
            # 移管後も新 org が一貫して使われるようにする。
            - name: Log in to GitHub Container Registry
              shell: bash
              env:
                  GHCR_REGISTRY: ${{ env.REGISTRY }}
                  GHCR_USER: ${{ github.repository_owner }}
                  GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  MAX_ATTEMPTS=3
                  for attempt in $(seq 1 $MAX_ATTEMPTS); do
                      echo "[attempt $attempt/$MAX_ATTEMPTS] Logging into $GHCR_REGISTRY as $GHCR_USER..."
                      if echo "$GHCR_TOKEN" | docker login "$GHCR_REGISTRY" -u "$GHCR_USER" --password-stdin; then
                          echo "Login succeeded on attempt $attempt"
                          exit 0
                      fi
                      if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
                          BACKOFF=$((attempt * 10))
                          echo "Login failed, waiting ${BACKOFF}s before retry..."
                          sleep "$BACKOFF"
                      fi
                  done
                  echo "All $MAX_ATTEMPTS login attempts failed" >&2
                  exit 1

            - name: Pull and inspect image
              run: |
                  echo "Pulling image..."
                  docker pull ${{ env.REGISTRY }}/vemiorg/mirelplatform:latest

                  echo "Inspecting image..."
                  docker inspect ${{ env.REGISTRY }}/vemiorg/mirelplatform:latest

                  echo "Image history..."
                  docker history ${{ env.REGISTRY }}/vemiorg/mirelplatform:latest

            - name: Test image startup
              run: |
                  echo "Testing image startup..."
                  docker run --rm ${{ env.REGISTRY }}/vemiorg/mirelplatform:latest bash -c "
                    echo 'Container started successfully' && 
                    java -version
                  "

            - name: Verify installed components
              run: |
                  echo "Verifying Java, Node.js, and pnpm..."
                  docker run --rm --entrypoint bash ${{ env.REGISTRY }}/vemiorg/mirelplatform:latest -c "
                    export NVM_DIR='/home/vscode/.nvm' && 
                    [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\" && 
                    export PATH=\"\$NVM_DIR/versions/node/v22.20.0/bin:\$PATH\" &&
                    echo '=== Java Version ===' && 
                    java -version && 
                    echo '=== Node.js Version ===' && 
                    node --version && 
                    echo '=== pnpm Version ===' && 
                    pnpm --version &&
                    echo '=== JAR Files ===' &&
                    find /workspace/backend/build/libs -name '*.jar' ! -name '*plain.jar'
                  "

            - name: Create verification summary
              run: |
                  echo "## All-in-One Image Verification ✅" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "Image \`${{ env.REGISTRY }}/vemiorg/mirelplatform:latest\` has been successfully verified." >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "The image includes:" >> $GITHUB_STEP_SUMMARY
                  echo "- ☕ Java 21 (Temurin)" >> $GITHUB_STEP_SUMMARY
                  echo "- 🟢 Node.js 22" >> $GITHUB_STEP_SUMMARY
                  echo "- 📦 pnpm" >> $GITHUB_STEP_SUMMARY
                  echo "- 🚀 Backend (Spring Boot) + Frontend (Vite) + Nginx" >> $GITHUB_STEP_SUMMARY

    verify-backend:
        name: Verify Backend Image
        runs-on: ubuntu-latest
        needs: build-and-push
        timeout-minutes: 10
        permissions:
            contents: read
            packages: read

        steps:
            # docker/login-action の代わりにシェルでログインしてリトライ。
            # 2026-05-11 に ghcr.io への login で Client.Timeout が複数回発生
            # （プラットフォーム既知問題: github/community/discussions/182234 /
            # githubstatus.com/incidents/vkr22005hg0x）。
            # username は github.actor ではなく repository_owner にして
            # 移管後も新 org が一貫して使われるようにする。
            - name: Log in to GitHub Container Registry
              shell: bash
              env:
                  GHCR_REGISTRY: ${{ env.REGISTRY }}
                  GHCR_USER: ${{ github.repository_owner }}
                  GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  MAX_ATTEMPTS=3
                  for attempt in $(seq 1 $MAX_ATTEMPTS); do
                      echo "[attempt $attempt/$MAX_ATTEMPTS] Logging into $GHCR_REGISTRY as $GHCR_USER..."
                      if echo "$GHCR_TOKEN" | docker login "$GHCR_REGISTRY" -u "$GHCR_USER" --password-stdin; then
                          echo "Login succeeded on attempt $attempt"
                          exit 0
                      fi
                      if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
                          BACKOFF=$((attempt * 10))
                          echo "Login failed, waiting ${BACKOFF}s before retry..."
                          sleep "$BACKOFF"
                      fi
                  done
                  echo "All $MAX_ATTEMPTS login attempts failed" >&2
                  exit 1

            - name: Pull and inspect image
              run: |
                  echo "Pulling image..."
                  docker pull ${{ env.REGISTRY }}/vemiorg/mirelplatform-backend:latest

                  echo "Inspecting image..."
                  docker inspect ${{ env.REGISTRY }}/vemiorg/mirelplatform-backend:latest

                  echo "Image size..."
                  docker images ${{ env.REGISTRY }}/vemiorg/mirelplatform-backend:latest --format "{{.Size}}"

            - name: Test Java runtime
              run: |
                  echo "Testing Java runtime..."
                  docker run --rm --entrypoint java ${{ env.REGISTRY }}/vemiorg/mirelplatform-backend:latest -version

            - name: Create verification summary
              run: |
                  IMAGE_SIZE=$(docker images ${{ env.REGISTRY }}/vemiorg/mirelplatform-backend:latest --format "{{.Size}}")
                  echo "## Backend Image Verification ✅" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "Image \`${{ env.REGISTRY }}/vemiorg/mirelplatform-backend:latest\` has been successfully verified." >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "**Image Size:** $IMAGE_SIZE (optimized for Cloud Run)" >> $GITHUB_STEP_SUMMARY
                  echo "" >> $GITHUB_STEP_SUMMARY
                  echo "The image includes:" >> $GITHUB_STEP_SUMMARY
                  echo "- ☕ Java 21 JRE (Eclipse Temurin Alpine)" >> $GITHUB_STEP_SUMMARY
                  echo "- 🚀 Spring Boot Application" >> $GITHUB_STEP_SUMMARY
                  echo "- 🌏 Asia/Tokyo timezone" >> $GITHUB_STEP_SUMMARY
