name: PR Build Verify

# PR 時点で master push と同等のビルド検証を行うことで、
# build-frontend-artifact.yml / docker-build.yml がマージ後に初めて落ちる事故を防ぐ。
# 副作用（git tag push, ghcr push, master commit）は一切持たない。

on:
    pull_request:
        branches: [master]
        paths:
            - "apps/frontend-v3/**"
            - "packages/ui/**"
            - "backend/**"
            - "Dockerfile"
            - "Dockerfile.backend"
            - "package.json"
            - "pnpm-lock.yaml"
            - "pnpm-workspace.yaml"
            - "VERSION"
            - ".github/workflows/pr-build-verify.yml"
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: pr-build-verify-${{ github.ref }}
    cancel-in-progress: true

jobs:
    frontend-build:
        name: Frontend Build (tsc + vite)
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Install pnpm
              uses: pnpm/action-setup@v6

            - name: Setup Node.js
              uses: actions/setup-node@v7
              with:
                  node-version: "24"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build frontend-v3
              run: pnpm --filter frontend-v3 build

    docker-build-verify:
        name: Docker Build Verify (${{ matrix.type }})
        runs-on: ubuntu-latest
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                include:
                    - type: all-in-one
                      dockerfile: ./Dockerfile
                    - type: backend-only
                      dockerfile: ./Dockerfile.backend
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Read VERSION file
              id: version
              run: echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Build Docker image (no push)
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ${{ matrix.dockerfile }}
                  push: false
                  load: false
                  cache-from: type=gha,scope=${{ matrix.type }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.type }}
                  platforms: linux/amd64
                  build-args: |
                      NODE_VERSION=22
                      NVM_VERSION=0.39.7
                      APP_VERSION=${{ steps.version.outputs.version }}
