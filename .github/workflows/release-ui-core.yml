name: Release @mireljs/ui-core

on:
  workflow_dispatch:
  push:
    branches: ["master"]
    paths:
      - "packages/ui/**"
#  pull_request:
#    types: [closed]
#    branches: ["master"]
#    paths:
#      - "packages/ui/**"

permissions:
  contents: write
  id-token: write

# 同一ワークフローの並走を抑止。master への bump push と他ワークフローの
# rebase 競合（2026-05-11 障害）を防ぐ。
concurrency:
  group: release-ui-core-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    # pushイベント、またはマージされたPRの場合のみ実行
    #    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Node 22.22.2 の npm 10.9.7 は promise-retry 欠落バグあり (nodejs/node#62425)
          # npm@11.11.0 以降では修正済みのため、22.22.2 でも明示的に 11.x を指定すれば動作する
          # runner image が修正されたら node-version を "22" に戻してよい
          node-version: "24.15.0"
          cache: "pnpm"

      - name: Update npm for OIDC provenance support
        # npm 11.11.0+ で promise-retry バグが修正されており OIDC provenance に必要
        # Node 22.22.2 同梱の npm 10.9.7 はバグがあるため明示的にバージョン指定する
        run: npm install -g npm@11.11.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check Version and Auto Bump
        id: check_version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Single Source of Truth から読み込み
          CURRENT_VERSION=$(cat VERSION)
          echo "Current version: $CURRENT_VERSION"

          # Remote Tag Search Loop
          VERSION=$CURRENT_VERSION
          while true; do
            TAG_NAME="ui-core/v$VERSION"
            echo "Checking if tag $TAG_NAME exists on remote..."
            
            if git ls-remote --tags origin | grep -q "refs/tags/$TAG_NAME"; then
              echo "Tag $TAG_NAME already exists. Bumping..."
              # VERSION を patch bump (shell のみ)
              IFS='.' read -ra PARTS <<< "$VERSION"
              PATCH=$((${PARTS[2]} + 1))
              VERSION="${PARTS[0]}.${PARTS[1]}.$PATCH"
            else
              echo "Tag $TAG_NAME does not exist. Using version $VERSION"
              break
            fi
          done

          FINAL_TAG="ui-core/v$VERSION"

          # Diagnostic: capture working tree state right after checkout+install
          # (before any intentional write) to see if pnpm install left drift.
          # run 24600445487 で " M pnpm-lock.yaml" を確認済み。実際の diff 中身を
          # 取得して恒久対応（master に追記）の判断材料にする。
          echo "::group::git status right after install"
          git status --porcelain
          echo "::endgroup::"

          echo "::group::git diff pnpm-lock.yaml (full, right after install)"
          git --no-pager diff pnpm-lock.yaml
          echo "::endgroup::"

          # Only commit and push if version changed
          if [ "$VERSION" != "$CURRENT_VERSION" ]; then
            echo "Version bumped from $CURRENT_VERSION to $VERSION"
            # VERSION ファイルと全 package.json を同期更新
            echo "$VERSION" > VERSION
            cd packages/ui
            npm version $VERSION --no-git-tag-version --allow-same-version
            cd ../..
            jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
            git add VERSION packages/ui/package.json package.json
            git commit -m "chore(release): bump to $VERSION [skip ci]"

            echo "::group::git status after commit, before rebase"
            git status --porcelain
            git diff --stat
            echo "::endgroup::"

            # Fetch and rebase to avoid non-fast-forward on rerun
            git fetch origin master
            git -c rebase.autoStash=true rebase origin/master

            # Push changes to master
            git push origin master

            echo "bumped=true" >> $GITHUB_OUTPUT
          else
            echo "No version bump needed"
            # package.json が VERSION と同期しているか確認（あるべき姿の維持）
            cd packages/ui
            PKG_VERSION=$(jq -r '.version' package.json)
            cd ../..
            if [ "$PKG_VERSION" != "$VERSION" ]; then
              echo "package.json ($PKG_VERSION) is out of sync with VERSION ($VERSION). Syncing..."
              cd packages/ui
              npm version $VERSION --no-git-tag-version --allow-same-version
              cd ../..
              jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json
              git add packages/ui/package.json package.json
              git commit -m "chore(release): sync package.json to $VERSION [skip ci]"

              echo "::group::git status after sync commit, before rebase"
              git status --porcelain
              git diff --stat
              echo "::endgroup::"

              git fetch origin master
              git -c rebase.autoStash=true rebase origin/master
              git push origin master
            fi
            echo "bumped=false" >> $GITHUB_OUTPUT
          fi

          echo "tag_name=$FINAL_TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          cd packages/ui
          pnpm build

      # 順序: Build → Publish → Tag。
      # publish 失敗時に tag を残さないことで「tag だけ存在し npm に穴」状態を防ぐ
      # (2026-05-11 障害の構造的対策)。
      - name: Publish to npm
        run: |
          cd packages/ui
          VERSION="${{ steps.check_version.outputs.version }}"
          # Check if version already exists on npm (idempotent)
          if npm view @mireljs/ui-core@$VERSION version 2>/dev/null; then
            echo "Version $VERSION already published, skipping..."
          else
            npm publish --access public --provenance
          fi

      - name: Create Tag
        run: |
          TAG_NAME="${{ steps.check_version.outputs.tag_name }}"
          echo "Creating tag: $TAG_NAME"
          # Skip if tag already exists (idempotent)
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG_NAME"; then
            echo "Tag $TAG_NAME already exists on remote, skipping..."
          else
            git tag $TAG_NAME
            git push origin $TAG_NAME
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.check_version.outputs.tag_name }}
          name: mirel Design System ${{ steps.check_version.outputs.tag_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
