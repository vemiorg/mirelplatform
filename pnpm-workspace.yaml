# pnpm ワークスペース設定
# frontend-v3 および共通パッケージ管理

packages:
  - 'apps/*'
  - 'packages/*'

minimumReleaseAgeExclude:
  - '@typescript-eslint/eslint-plugin@8.62.1'
  - '@typescript-eslint/parser@8.62.1'
  - '@typescript-eslint/project-service@8.62.1'
  - '@typescript-eslint/scope-manager@8.62.1'
  - '@typescript-eslint/tsconfig-utils@8.62.1'
  - '@typescript-eslint/type-utils@8.62.1'
  - '@typescript-eslint/types@8.62.1'
  - '@typescript-eslint/typescript-estree@8.62.1'
  - '@typescript-eslint/utils@8.62.1'
  - '@typescript-eslint/visitor-keys@8.62.1'
  - prettier@3.9.4
  - react-router-dom@7.18.1
  - react-router@7.18.1
  - recharts@3.9.1
  - typescript-eslint@8.62.1
  - vite@8.1.1

# セキュリティ修正: 推移的依存をパッチ版へ固定（Dependabot 対応）
# pnpm 11 以降は overrides / peerDependencyRules / onlyBuiltDependencies を
# package.json の "pnpm" フィールドではなく本ファイルで読む。
overrides:
  brace-expansion: '^5.0.6' # GHSA-jxxr-4gwj-5jf2 (Medium)
  ws: '^8.20.1' # GHSA-58qx-3vcg-4xpx (Medium)
  undici: '^8.5.0' # GHSA (undici < 7.28.0) High — メジャー更新で解消
  rollup: '^4.62.2'
  flatted: '^3.4.2'
  '@isaacs/brace-expansion': '^5.0.1'
  lodash: '^4.18.1'
  minimatch: '^10.2.5'
  '@microsoft/api-extractor': '^7.58.9'

peerDependencyRules:
  allowedVersions:
    react: '19'
    react-dom: '19'
    eslint-plugin-react-hooks>eslint: '>=10'

onlyBuiltDependencies:
  - esbuild
