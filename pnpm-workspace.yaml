# pnpm ワークスペース設定
# frontend-v3 および共通パッケージ管理

packages:
  - 'apps/*'
  - 'packages/*'

minimumReleaseAgeExclude:
  - '@typescript-eslint/eslint-plugin@8.62.1 || 8.63.0'
  - '@typescript-eslint/parser@8.62.1 || 8.63.0'
  - '@typescript-eslint/project-service@8.62.1 || 8.63.0'
  - '@typescript-eslint/scope-manager@8.62.1 || 8.63.0'
  - '@typescript-eslint/tsconfig-utils@8.62.1 || 8.63.0'
  - '@typescript-eslint/type-utils@8.62.1 || 8.63.0'
  - '@typescript-eslint/types@8.62.1 || 8.63.0'
  - '@typescript-eslint/typescript-estree@8.62.1 || 8.63.0'
  - '@typescript-eslint/utils@8.62.1 || 8.63.0'
  - '@typescript-eslint/visitor-keys@8.62.1 || 8.63.0'
  - prettier@3.9.4
  - react-router-dom@7.18.1
  - react-router@7.18.1
  - recharts@3.9.1
  - typescript-eslint@8.62.1 || 8.63.0
  - vite@8.1.1
  - '@codemirror/view@6.43.6'
  - '@radix-ui/primitive@1.1.5'
  - '@radix-ui/react-accordion@1.2.16'
  - '@radix-ui/react-collapsible@1.1.16'
  - '@radix-ui/react-collection@1.1.12'
  - '@radix-ui/react-context@1.2.0'
  - '@radix-ui/react-dialog@1.1.19'
  - '@radix-ui/react-dismissable-layer@1.1.15'
  - '@radix-ui/react-dropdown-menu@2.1.20'
  - '@radix-ui/react-focus-scope@1.1.12'
  - '@radix-ui/react-menu@2.1.20'
  - '@radix-ui/react-popover@1.1.19'
  - '@radix-ui/react-popper@1.3.3'
  - '@radix-ui/react-presence@1.1.7'
  - '@radix-ui/react-roving-focus@1.1.15'
  - '@radix-ui/react-scroll-area@1.2.14'
  - '@radix-ui/react-select@2.3.3'
  - '@radix-ui/react-slider@1.4.3'
  - '@radix-ui/react-switch@1.3.3'
  - '@radix-ui/react-tabs@1.1.17'
  - '@radix-ui/react-toast@1.2.19'
  - '@radix-ui/react-tooltip@1.2.12'
  - '@vitest/expect@4.1.10'
  - '@vitest/mocker@4.1.10'
  - '@vitest/pretty-format@4.1.10'
  - '@vitest/runner@4.1.10'
  - '@vitest/snapshot@4.1.10'
  - '@vitest/spy@4.1.10'
  - '@vitest/utils@4.1.10'
  - vitest@4.1.10

# セキュリティ修正: 推移的依存をパッチ版へ固定（Dependabot 対応）
# pnpm 11 以降は overrides / peerDependencyRules / onlyBuiltDependencies を
# package.json の "pnpm" フィールドではなく本ファイルで読む。
overrides:
  brace-expansion: '^5.0.6' # GHSA-jxxr-4gwj-5jf2 (Medium)
  ws: '^8.20.1' # GHSA-58qx-3vcg-4xpx (Medium)
  undici: '^8.5.0' # GHSA (undici < 7.28.0) High — メジャー更新で解消
  rollup: '^4.62.2'
  flatted: '^3.4.2'
  '@isaacs/brace-expansion': '^5.0.1'
  lodash: '^4.18.1'
  minimatch: '^10.2.5'
  '@microsoft/api-extractor': '^7.58.9'

peerDependencyRules:
  allowedVersions:
    react: '19'
    react-dom: '19'
    eslint-plugin-react-hooks>eslint: '>=10'

onlyBuiltDependencies:
  - esbuild
